<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Surprise 🎁</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body class="gift-page">

<div class="gift-container">

<div class="gift-box">
🎁
</div>

<h1>Tap to Open Your Surprise ❤️</h1>

<button id="openGift">
Open Gift 💝
</button>

</div>

<audio id="bgMusic">
<source src="bdy.mp3" type="audio/mpeg">
</audio>

<script>

const previewMode = window.location.search.includes("preview=true");

document.getElementById("openGift").addEventListener("click",()=>{

const music=document.getElementById("bgMusic");

music.play().catch(()=>{});

if(typeof confetti==="function"){

confetti({

particleCount:300,

spread:180,

origin:{y:0.6}

});

}

setTimeout(()=>{

if(previewMode){

window.location.href="birthday.html?preview=true";

}else{

window.location.href="birthday.html";

}

},1500);

});

</script>

</body>
</html>
