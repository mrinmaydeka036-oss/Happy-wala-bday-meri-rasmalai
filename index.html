<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Little Surprise For Prishuuu ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

</head>

<body class="countdown-page">

<div class="countdown-box">

<h1>💖 A Little Surprise For Prishuuu 💖</h1>

<p>Come back when the countdown reaches zero... ⏳❤️</p>

<div id="countdown">
<h2>Loading...</h2>
</div>

</div>

<script>

// Preview Mode
const previewMode = window.location.search.includes("preview=true");

// If preview, skip countdown
if (previewMode) {
    window.location.href = "gift.html?preview=true";
}

// Unlock Date
const unlockDate = new Date("July 31, 2026 00:00:00").getTime();

function updateCountdown(){

const now = new Date().getTime();

const distance = unlockDate - now;

if(distance <= 0){

window.location.href="gift.html";

return;

}

const days=Math.floor(distance/(1000*60*60*24));

const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));

const minutes=Math.floor((distance%(1000*60*60))/(1000*60));

const seconds=Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
`<h2>${days}d ${hours}h ${minutes}m ${seconds}s</h2>`;

}

updateCountdown();

setInterval(updateCountdown,1000);

</script>

</body>
</html>
